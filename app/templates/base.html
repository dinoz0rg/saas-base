<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Tracker{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/static/js/tailwind.config.js"></script>
    <link rel="stylesheet" href="/static/css/app.css">
    <script>
        // Bootstrap user theme/accent before paint to avoid flash.
        (function () {
            try {
                var theme = {{ user.theme|tojson if user is defined and user else '"system"' }};
                var accent = {{ user.accent|tojson if user is defined and user else '"blue"' }};
                var stored = localStorage.getItem('app.theme');
                if (stored) theme = stored;
                var sa = localStorage.getItem('app.accent');
                if (sa) accent = sa;
                var resolved = theme === 'system'
                    ? (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
                    : theme;
                document.documentElement.dataset.theme = resolved;
                document.documentElement.dataset.accent = accent;
            } catch (e) { /* ignore */ }
        })();
    </script>
</head>
<body class="h-full bg-sidebar text-neutral-900 text-sm antialiased">
    <div class="flex h-full">
        {% block body %}{% endblock %}
    </div>
    <script src="/static/js/app.js"></script>
    <script src="/static/js/navigator.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
