{% extends "base.html" %}
{% block title %}Two-factor Authentication — Aceternity{% endblock %}
{% block body %}
<div class="flex h-full w-full items-center justify-center bg-neutral-50">
    <div class="w-full max-w-sm">
        <!-- Logo -->
        <div class="mb-8 text-center">
            <div class="mx-auto mb-4 flex h-10 w-10 items-center justify-center rounded-lg bg-neutral-900">
                <svg class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/>
                </svg>
            </div>
            <h1 class="text-lg font-semibold text-neutral-900">Two-factor Authentication</h1>
            <p class="mt-1 text-sm text-neutral-500">Enter the 6-digit code from your authenticator app</p>
        </div>
        <!-- Form card -->
        <div class="rounded-xl border border-neutral-200 bg-white p-6 shadow-sm">
            {% if error %}
            <div class="mb-4 rounded-lg bg-red-50 px-4 py-3 text-sm text-red-600">
                {{ error }}
            </div>
            {% endif %}
            <form method="post" action="/login/2fa" class="space-y-4">
                <input type="hidden" name="next" value="{{ next }}">
                <div>
                    <label for="code" class="mb-1.5 block text-sm font-medium text-neutral-700">Verification code</label>
                    <input type="text" id="code" name="code" required autofocus
                        autocomplete="one-time-code" inputmode="numeric" pattern="[0-9]{6}" maxlength="6"
                        class="w-full rounded-lg border border-neutral-200 bg-white px-3 py-2 text-sm text-neutral-900 placeholder-neutral-400 outline-none transition focus:border-neutral-400 focus:ring-2 focus:ring-neutral-100 tracking-[0.3em] text-center text-lg font-mono"
                        placeholder="000000">
                </div>
                <button type="submit"
                    class="w-full rounded-lg bg-neutral-900 px-4 py-2.5 text-sm font-medium text-white transition hover:bg-neutral-800 active:bg-neutral-950">
                    Verify
                </button>
            </form>
        </div>
        <p class="mt-6 text-center text-sm text-neutral-500">
            <a href="/login" class="font-medium text-neutral-900 hover:underline">← Back to sign in</a>
        </p>
    </div>
</div>
{% endblock %}
