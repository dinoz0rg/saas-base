{% extends "base.html" %}

{% block title %}Sign in — Aceternity{% endblock %}

{% block body %}
<div class="flex h-full w-full items-center justify-center bg-neutral-50">
    <div class="w-full max-w-sm">
        <!-- Logo -->
        <div class="mb-8 text-center">
            <div class="mx-auto mb-4 flex h-10 w-10 items-center justify-center rounded-lg bg-neutral-900">
                <svg class="h-5 w-5 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z"/>
                </svg>
            </div>
            <h1 class="text-lg font-semibold text-neutral-900">Sign in to Aceternity</h1>
            <p class="mt-1 text-sm text-neutral-500">Welcome back. Enter your credentials to continue.</p>
        </div>

        <!-- Form card -->
        <div class="rounded-xl border border-neutral-200 bg-white p-6 shadow-sm">
            {% if error %}
            <div class="mb-4 rounded-lg bg-red-50 px-4 py-3 text-sm text-red-600">
                {{ error }}
            </div>
            {% endif %}

            <form method="post" action="/login" class="space-y-4">
                <input type="hidden" name="next" value="{{ next }}">

                <div>
                    <label for="email" class="mb-1.5 block text-sm font-medium text-neutral-700">Email</label>
                    <input type="email" id="email" name="email" value="{{ email|default('', true) }}" required
                        autocomplete="email" autofocus
                        class="w-full rounded-lg border border-neutral-200 bg-white px-3 py-2 text-sm text-neutral-900 placeholder-neutral-400 outline-none transition focus:border-neutral-400 focus:ring-2 focus:ring-neutral-100"
                        placeholder="you@example.com">
                </div>

                <div>
                    <label for="password" class="mb-1.5 block text-sm font-medium text-neutral-700">Password</label>
                    <input type="password" id="password" name="password" required
                        autocomplete="current-password"
                        class="w-full rounded-lg border border-neutral-200 bg-white px-3 py-2 text-sm text-neutral-900 placeholder-neutral-400 outline-none transition focus:border-neutral-400 focus:ring-2 focus:ring-neutral-100"
                        placeholder="••••••••">
                </div>

                <button type="submit"
                    class="w-full rounded-lg bg-neutral-900 px-4 py-2.5 text-sm font-medium text-white transition hover:bg-neutral-800 active:bg-neutral-950">
                    Sign in
                </button>
            </form>
        </div>

        <p class="mt-6 text-center text-sm text-neutral-500">
            Don't have an account?
            <a href="/register" class="font-medium text-neutral-900 hover:underline">Create one</a>
        </p>
    </div>
</div>
{% endblock %}
